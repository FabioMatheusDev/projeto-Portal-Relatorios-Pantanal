<div class="flex min-h-screen bg-slate-100 dark:bg-slate-950">
  <aside
    class="sidebar flex flex-col border-r border-slate-800/50 bg-slate-900 text-slate-100 transition-all duration-300 ease-out"
    [class.w-64]="!collapsed()"
    [class.w-[4.5rem]]="collapsed()"
  >
    <div
      class="flex h-16 items-center gap-2 border-b border-slate-800/60 px-3"
      [class.justify-center]="collapsed()"
      [class.justify-between]="!collapsed()"
    >
      @if (!collapsed()) {
        <div class="flex min-w-0 items-center gap-2">
          <img
            [src]="brandLogoSrc()"
            (error)="onBrandLogoError()"
            alt="Pantanal Agrícola"
            class="h-9 w-auto shrink-0 object-contain opacity-95"
          />
        </div>
      }
      <button
        type="button"
        (click)="toggle()"
        class="shrink-0 rounded-lg p-2 text-slate-400 hover:bg-slate-800 hover:text-white transition-colors"
        [attr.aria-label]="collapsed() ? 'Expandir menu' : 'Recolher menu'"
      >
        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
    </div>
    <nav class="flex min-h-0 flex-1 flex-col p-2">
      <div class="min-h-0 flex-1 space-y-1">
        <a
          routerLink="/dashboard"
          routerLinkActive="bg-emerald-600/20 text-emerald-300"
          [routerLinkActiveOptions]="{ exact: true }"
          class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium text-slate-300 hover:bg-slate-800 transition-colors"
        >
          <span class="inline-flex h-9 w-9 items-center justify-center rounded-lg bg-slate-800/80">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
          </span>
          <span [class.hidden]="collapsed()">Home</span>
        </a>
        <a
          routerLink="/reports"
          routerLinkActive="bg-emerald-600/20 text-emerald-300"
          class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium text-slate-300 hover:bg-slate-800 transition-colors"
        >
          <span class="inline-flex h-9 w-9 items-center justify-center rounded-lg bg-slate-800/80">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
          </span>
          <span [class.hidden]="collapsed()">Relatórios</span>
        </a>
      </div>
      @if (auth.isAdmin()) {
        <div class="mt-auto border-t border-slate-800/60 pt-2">
          <a
            routerLink="/settings/permissions"
            routerLinkActive="bg-emerald-600/20 text-emerald-300"
            class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium text-slate-300 hover:bg-slate-800 transition-colors"
          >
            <span class="inline-flex h-9 w-9 items-center justify-center rounded-lg bg-slate-800/80">
              <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              </svg>
            </span>
            <span [class.hidden]="collapsed()">Configuração</span>
          </a>
        </div>
      }
    </nav>
    <div class="border-t border-slate-800/60 p-3">
      <button
        type="button"
        (click)="logout()"
        class="w-full rounded-xl px-3 py-2 text-left text-sm text-slate-400 hover:bg-slate-800 hover:text-white transition-colors"
      >
        <span [class.hidden]="collapsed()">Sair</span>
        <span [class.sr-only]="!collapsed()">Sair</span>
      </button>
    </div>
  </aside>
  <div class="flex min-w-0 flex-1 flex-col">
    <header class="flex h-16 items-center border-b border-slate-200 bg-white/80 px-6 backdrop-blur dark:border-slate-800 dark:bg-slate-900/80">
      <h1 class="text-lg font-semibold text-slate-800 dark:text-slate-100">Portal de Relatórios</h1>
      <span class="ml-auto text-sm text-slate-500">{{ auth.user()?.username }}</span>
    </header>
    <main class="flex-1 overflow-auto p-6">
      <router-outlet />
    </main>
  </div>
</div>
