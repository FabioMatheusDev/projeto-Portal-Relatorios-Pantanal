<div class="space-y-6">
  <div>
    <h2 class="text-xl font-semibold text-slate-800 dark:text-slate-100">Relatórios por setor</h2>
    <p class="text-sm text-slate-500">Selecione um setor para listar relatórios (estrutura preparada para integração SAP).</p>
  </div>
  <ul class="grid gap-3 sm:grid-cols-2 xl:grid-cols-3">
    @for (s of sectors; track s.slug) {
      <li>
        <a
          [routerLink]="['/reports', s.slug]"
          class="flex items-center justify-between rounded-2xl border border-slate-200 bg-white px-4 py-4 text-sm font-medium text-slate-800 shadow-sm transition hover:border-emerald-500/50 hover:shadow-md dark:border-slate-800 dark:bg-slate-900/60 dark:text-slate-100"
        >
          {{ s.name }}
          <span class="text-slate-400">→</span>
        </a>
      </li>
    }
  </ul>
</div>
