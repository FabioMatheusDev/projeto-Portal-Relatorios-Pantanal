# Netlify: Angular 19 (output em dist/.../browser). Ajuste no painel não é necessário se este arquivo estiver no repo.
[build]
  command = "node scripts/patch-api-url.mjs && cd src/PortalRelatorios.Web && npm ci && npx ng build --configuration production"
  publish = "src/PortalRelatorios.Web/dist/portal-relatorios-web/browser"

[build.environment]
  NODE_VERSION = "20"
  # URL pública da API ASP.NET (obrigatório no Netlify), ex.: https://sua-api.azurewebsites.net/api
  # API_PUBLIC_URL = "https://..."

# SPA: todas as rotas entregam index.html (evita 404 ao atualizar /login etc.)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
